name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint · Typecheck · Tests · Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (zero warnings allowed)
        run: npx eslint . --max-warnings 0

      - name: Typecheck (strict, client + server)
        run: npm run typecheck

      - name: Tests with coverage (thresholds ≥90% enforced)
        run: npm run coverage

      - name: Production build
        run: npm run build
